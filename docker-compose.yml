version: "3.9"

services:
  nlp-service-java:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    container_name: nlp-service-java
    ports:
      - "8192:8192"
    environment:
      - OLLAMA_API_URL=http://host.docker.internal:11434/api/generate
      - OLLAMA_MODEL=deepseek-r1
      - SERVER_PORT=8192
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
